<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body{
  margin:0;
  font-family: 'Cairo', sans-serif;;
  background:#0d1b2a;
  color: white;
}

header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  position: sticky;
  top: 0; 
  background: rgba(0,0,0,0.7);    
  flex-wrap: wrap;
}
header h1{
  font-size: 20px;
}

.logo {
  width: 60px; 
  height: 60px;      
  border-radius: 50%;
  object-fit: cover; 
}

/* NAV */
nav {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}
/* ================= FORM ================= */
.booking{
  max-width: 400px;
  margin: 40px auto;
  background: black;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.booking input,
.booking select{
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: none;
}

.booking button{
  width: 100%;
  padding: 10px;
  background: #25D366;
  color: white;
  border: none;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
}

#errorMsg{
  color: red;
}

#successMsg{
  color: lightgreen;
  display: none;
}
/* ================= FOOTER ================= */
footer {
  background: #111;
  text-align: center;
  padding: 15px;
  margin-top: 120px;
}

/* ================= MOBILE ================= */
@media (max-width: 768px){

  header{
    flex-direction: column;
    text-align: center;
  }

  nav{
    justify-content: center;
  }

  header h1{
    font-size: 18px;
  }

  .Home h2{
    font-size: 22px;
  }

}
    </style>
    
</head>
<body>mg/
   <header>
  <h1>Dr. Osama's Animal Clinic</h1>
  <img src="5456381914211095809_121.jpg" class="logo">

  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="Services.html">الخدمات</a>
    <a href="Book an appointment.html">حجز موعد</a>
    <a href="advice.html">نصائح</a>
    <a href="communication.html">تواصل معنا</a>
  </nav>
</header>  
<section class="booking">
  <h2>حجز موعد</h2>

  <form id="bookingForm">

    <input type="text" id="name" placeholder="اسم صاحب الحيوان">

    <select id="animal">
      <option value="">اختر نوع الحيوان</option>
      <option>قط</option>
      <option>كلب</option>
      <option>طائر</option>
      <option>أخرى</option>
    </select>

    <input type="date" id="date">
    <input type="time" id="time">

    <button type="submit">احجز الآن</button>

    <p id="errorMsg"></p>
    <p id="successMsg">تم الحجز بنجاح ✅</p>

  </form>
</section>
 <footer>
  <p>© 2026 Dr_Osama Sh - جميع الحقوق محفوظة</p>
</footer>
<script>

document.getElementById("bookingForm").addEventListener("submit", function(e){

  e.preventDefault();

  let name = document.getElementById("name").value;
  let animal = document.getElementById("animal").value;
  let date = document.getElementById("date").value;
  let time = document.getElementById("time").value;

  let errorMsg = document.getElementById("errorMsg");
  let successMsg = document.getElementById("successMsg");

  errorMsg.textContent = "";
  successMsg.style.display = "none";

  if(name === "" || animal === "" || date === "" || time === ""){
    errorMsg.textContent = "الرجاء تعبئة جميع الحقول ❌";
    return;
  }

  successMsg.style.display = "block";

});

</script>
</body>
</html>
