<style>

body{
  margin:0;
  font-family: 'Cairo', sans-serif;
  background: #0d1b2a;
  color: white;
}

/* ================= HEADER ================= */
header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  position: sticky;
  top: 0; 
  background: rgba(0,0,0,0.7);    
  flex-wrap: wrap;
}

header h1{
  font-size: 20px;
}

.logo {
  width: 60px; 
  height: 60px;      
  border-radius: 50%;
  object-fit: cover; 
}

/* NAV */
nav {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* ================= HOME ================= */
.Home{ 
  text-align: center;
  padding: 80px 20px;
}

.Home h2{
  font-size: 28px;
}

.btn{
  padding: 10px 20px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 15px;
  width: 200px;
  max-width: 100%;
  font-family: 'Cairo', sans-serif;
}

/* ================= CARD ================= */
.card{
  background: black;
  padding:20px;
  margin: 20px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover{
  transform: translateY(-5px);
}

/* ================= FOOTER ================= */
footer {
  background: #111;
  text-align: center;
  padding: 15px;
  margin-top: 120px;
}

/* ================= MOBILE ================= */
@media (max-width: 768px){

  header{
    flex-direction: column;
    text-align: center;
  }

  nav{
    justify-content: center;
  }

  header h1{
    font-size: 18px;
  }

  .Home h2{
    font-size: 22px;
  }

}

</style>
